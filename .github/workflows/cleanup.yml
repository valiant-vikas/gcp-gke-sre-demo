name: Cleanup GKE Resources

on:
  workflow_dispatch:
    inputs:
      cleanup_action:
        description: "Choose cleanup action"
        required: true
        type: choice
        options:
          - scale-to-zero
          - delete
      cleanup_central:
        description: "Cleanup central cluster"
        required: true
        default: true
        type: boolean
      cleanup_east:
        description: "Cleanup east cluster"
        required: true
        default: false
        type: boolean
      cleanup_west:
        description: "Cleanup west cluster"
        required: true
        default: false
        type: boolean
      cleanup_south:
        description: "Cleanup south cluster"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Show selected cleanup targets
        run: |
          echo "## Cleanup Targets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Action: **${{ github.event.inputs.cleanup_action }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Central: ${{ github.event.inputs.cleanup_central }}" >> $GITHUB_STEP_SUMMARY
          echo "East: ${{ github.event.inputs.cleanup_east }}" >> $GITHUB_STEP_SUMMARY
          echo "West: ${{ github.event.inputs.cleanup_west }}" >> $GITHUB_STEP_SUMMARY
          echo "South: ${{ github.event.inputs.cleanup_south }}" >> $GITHUB_STEP_SUMMARY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud using WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      - name: Cleanup central cluster
        if: ${{ github.event.inputs.cleanup_central == 'true' }}
        run: |
          echo "Running cleanup on CENTRAL cluster"
          gcloud container clusters get-credentials profile-cluster --region us-central1 --project $PROJECT_ID

          if [ "${{ github.event.inputs.cleanup_action }}" = "scale-to-zero" ]; then
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl get deployment order-service >/dev/null 2>&1 && kubectl scale deployment order-service --replicas=0 || echo "order-service deployment not found"
            kubectl get deployment profile-service >/dev/null 2>&1 && kubectl scale deployment profile-service --replicas=0 || echo "profile-service deployment not found"
          else
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl delete ingress profile-ingress --ignore-not-found
            kubectl delete svc order-service --ignore-not-found
            kubectl delete svc profile-service --ignore-not-found
            kubectl delete deployment order-service --ignore-not-found
            kubectl delete deployment profile-service --ignore-not-found
          fi

          kubectl get all

      - name: Cleanup east cluster
        if: ${{ github.event.inputs.cleanup_east == 'true' }}
        run: |
          echo "Running cleanup on EAST cluster"
          gcloud container clusters get-credentials profile-cluster-east --region us-east1 --project $PROJECT_ID

          if [ "${{ github.event.inputs.cleanup_action }}" = "scale-to-zero" ]; then
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl get deployment order-service >/dev/null 2>&1 && kubectl scale deployment order-service --replicas=0 || echo "order-service deployment not found"
            kubectl get deployment profile-service >/dev/null 2>&1 && kubectl scale deployment profile-service --replicas=0 || echo "profile-service deployment not found"
          else
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl delete ingress profile-ingress --ignore-not-found
            kubectl delete svc order-service --ignore-not-found
            kubectl delete svc profile-service --ignore-not-found
            kubectl delete deployment order-service --ignore-not-found
            kubectl delete deployment profile-service --ignore-not-found
          fi

          kubectl get all

      - name: Cleanup west cluster
        if: ${{ github.event.inputs.cleanup_west == 'true' }}
        run: |
          echo "Running cleanup on WEST cluster"
          gcloud container clusters get-credentials profile-cluster-west --region us-west1 --project $PROJECT_ID

          if [ "${{ github.event.inputs.cleanup_action }}" = "scale-to-zero" ]; then
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl get deployment order-service >/dev/null 2>&1 && kubectl scale deployment order-service --replicas=0 || echo "order-service deployment not found"
            kubectl get deployment profile-service >/dev/null 2>&1 && kubectl scale deployment profile-service --replicas=0 || echo "profile-service deployment not found"
          else
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl delete ingress profile-ingress --ignore-not-found
            kubectl delete svc order-service --ignore-not-found
            kubectl delete svc profile-service --ignore-not-found
            kubectl delete deployment order-service --ignore-not-found
            kubectl delete deployment profile-service --ignore-not-found
          fi

          kubectl get all

      - name: Cleanup south cluster
        if: ${{ github.event.inputs.cleanup_south == 'true' }}
        run: |
          echo "Running cleanup on SOUTH cluster"
          gcloud container clusters get-credentials profile-cluster-south --region us-south1 --project $PROJECT_ID

          if [ "${{ github.event.inputs.cleanup_action }}" = "scale-to-zero" ]; then
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl get deployment order-service >/dev/null 2>&1 && kubectl scale deployment order-service --replicas=0 || echo "order-service deployment not found"
            kubectl get deployment profile-service >/dev/null 2>&1 && kubectl scale deployment profile-service --replicas=0 || echo "profile-service deployment not found"
          else
            kubectl delete hpa profile-service-hpa --ignore-not-found
            kubectl delete hpa order-service-hpa --ignore-not-found
            kubectl delete ingress profile-ingress --ignore-not-found
            kubectl delete svc order-service --ignore-not-found
            kubectl delete svc profile-service --ignore-not-found
            kubectl delete deployment order-service --ignore-not-found
            kubectl delete deployment profile-service --ignore-not-found
          fi

          kubectl get all